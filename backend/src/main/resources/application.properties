# Load environment variables from backend/.env
spring.config.import=optional:file:./.env[.properties]

# ============================================================
# Smart Home Energy Management System - Application Properties
# ============================================================

# ----- Server Configuration -----
server.port=${SERVER_PORT:8081}

# ----- MySQL Database Configuration -----
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:smarthome_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ----- JPA / Hibernate -----
spring.jpa.hibernate.ddl-auto=${JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ----- JWT Configuration -----
app.jwt.secret=${JWT_SECRET:SmartHomeEnergyManagement2024SecretKeyForJWT_ChangeInProd_VeryLong256Bit}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ----- Energy Configuration -----
app.energy.rate-per-kwh=${ENERGY_RATE_PER_KWH:0.12}
app.energy.alert-threshold-kwh=${ENERGY_ALERT_THRESHOLD_KWH:3.0}
app.energy.alert-window-minutes=${ENERGY_ALERT_WINDOW_MINUTES:60}

# ----- Email / SMTP Configuration -----
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_SMTP_CONNECTION_TIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${MAIL_SMTP_TIMEOUT:3000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_SMTP_WRITE_TIMEOUT:5000}

# Reset code expiry (10 minutes in ms)
app.reset-code.expiry-ms=${RESET_CODE_EXPIRY_MS:600000}

# ----- Google OAuth2 Configuration -----
spring.security.oauth2.client.registration.google.client-id=${OAUTH2_GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${OAUTH2_GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=${OAUTH2_GOOGLE_SCOPE:email,profile}
spring.security.oauth2.client.registration.google.redirect-uri=${OAUTH2_GOOGLE_REDIRECT_URI:http://localhost:8081/login/oauth2/code/google}
app.oauth2.redirect-uri=${OAUTH2_REDIRECT_URI:http://localhost:3000}

# Admin accounts (comma-separated)
app.admin.emails=${APP_ADMIN_EMAILS:admin@gmail.com}

# ----- CORS Configuration -----
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ----- Logging -----
logging.level.org.springframework.security=${LOG_LEVEL_SPRING_SECURITY:WARN}
logging.level.com.smarthome=${LOG_LEVEL_APP:INFO}
